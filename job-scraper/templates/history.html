<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>職缺歷史</title>
  <style>
    * { box-sizing: border-box; }
    body { margin: 0; font-family: system-ui, "Noto Sans TC", sans-serif; background: #f5f6f8; color: #1a1a1a; }
    header { background: #0066cc; color: #fff; padding: 20px 24px; }
    header h1 { margin: 0; font-size: 20px; }
    nav { margin-top: 10px; font-size: 14px; }
    nav a { color: #fff; margin-right: 16px; }
    main { max-width: 1100px; margin: 0 auto; padding: 24px; }
    form { margin-bottom: 16px; }
    select, button { padding: 8px 10px; border: 1px solid #e2e5ea; border-radius: 6px; font-size: 14px; }
    button { background: #0066cc; color: #fff; border: 0; cursor: pointer; }
    table { width: 100%; border-collapse: collapse; background: #fff; border: 1px solid #e2e5ea; border-radius: 10px; overflow: hidden; }
    th, td { text-align: left; padding: 10px 12px; border-bottom: 1px solid #eef; font-size: 13px; }
    th { background: #fafbfc; font-size: 12px; color: #667; }
    a { color: #0066cc; text-decoration: none; }
    .empty { text-align: center; color: #889; padding: 40px; }
    .src { font-size: 12px; color: #667; border: 1px solid #dde; border-radius: 4px; padding: 1px 6px; }
  </style>
</head>
<body>
  <header>
    <h1>職缺歷史追蹤</h1>
    <nav>
      <a href="/" style="opacity:.85">🔍 查詢</a>
      <a href="/history">🗂 歷史</a>
      <a href="/trends" style="opacity:.85">📈 薪資趨勢</a>
    </nav>
  </header>
  <main>
    <form method="get" action="/history">
      <select name="keyword" onchange="this.form.submit()">
        <option value="">全部關鍵字</option>
        {% for k in keywords %}
          <option value="{{ k }}" {% if k == keyword %}selected{% endif %}>{{ k }}</option>
        {% endfor %}
      </select>
      <button type="submit">篩選</button>
    </form>

    {% if rows %}
      <p style="color:#445;font-size:14px">共 {{ rows|length }} 筆歷史職缺（依首次出現時間排序）</p>
      <table>
        <thead>
          <tr><th>來源</th><th>職缺</th><th>公司</th><th>薪資</th><th>地區</th><th>關鍵字</th><th>首次出現</th></tr>
        </thead>
        <tbody>
          {% for r in rows %}
            <tr>
              <td><span class="src">{{ r.source }}</span></td>
              <td><a href="{{ r.job_url }}" target="_blank" rel="noopener">{{ r.title }}</a></td>
              <td>{{ r.company }}</td>
              <td>{{ r.salary }}</td>
              <td>{{ r.location }}</td>
              <td>{{ r.keyword }}</td>
              <td>{{ r.first_seen[:10] }}</td>
            </tr>
          {% endfor %}
        </tbody>
      </table>
    {% else %}
      <div class="empty">尚無歷史資料。先到查詢頁跑幾次查詢，結果會自動存入資料庫。</div>
    {% endif %}
  </main>
</body>
</html>
